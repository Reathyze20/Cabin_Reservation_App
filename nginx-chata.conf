server {
    server_name chataceskestredohori.cz;

    client_max_body_size 60M;

    # Never cache service worker and index.html — critical for PWA updates
    location = /sw.js {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /index.html {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /manifest.webmanifest {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/chataceskestredohori.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chataceskestredohori.cz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = chataceskestredohori.cz) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name chataceskestredohori.cz;
    return 404;
}
