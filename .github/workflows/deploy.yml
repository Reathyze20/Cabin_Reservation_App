name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
    - name: Execute deployment commands on server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          set -e

          # Explicitly source nvm to make node/npm available
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          # Navigate to the app directory
          cd ${{ secrets.SERVER_PATH }}

          echo "=== Backing up data ==="
          # Clean up any previous failed backup
          rm -rf /tmp/cabin_data_backup

          # Clean up nested directories from previous bug
          if [ -d "data/uploads/uploads" ]; then
            echo "Cleaning up nested uploads..."
            rm -rf data/uploads/uploads
          fi
          if [ -d "data/logs/logs" ]; then
            echo "Cleaning up nested logs..."
            rm -rf data/logs/logs
          fi

          # Backup untracked/ignored data (live JSON data, logs, uploads)
          mkdir -p /tmp/cabin_data_backup
          if ls data/*.json 1>/dev/null 2>&1; then
            cp data/*.json /tmp/cabin_data_backup/
          fi
          if [ -d "data/logs" ]; then
            cp -R data/logs /tmp/cabin_data_backup/
          fi
          if [ -d "data/uploads" ]; then
            cp -R data/uploads /tmp/cabin_data_backup/
          fi

          # Backup .env file (contains sensitive credentials)
          if [ -f ".env" ]; then
            echo "Backing up .env file..."
            cp .env /tmp/cabin_data_backup/.env
          fi

          echo "=== Updating code ==="
          # Force-reset to remote main (avoids merge conflicts from
          # package-lock.json or any server-side file modifications)
          git fetch origin main
          git reset --hard origin/main

          echo "=== Restoring data ==="
          # Restore backed-up data files on top of fresh checkout
          if ls /tmp/cabin_data_backup/*.json 1>/dev/null 2>&1; then
            cp /tmp/cabin_data_backup/*.json data/
          fi
          if [ -d "/tmp/cabin_data_backup/logs" ]; then
            rm -rf data/logs
            cp -R /tmp/cabin_data_backup/logs data/
          fi
          if [ -d "/tmp/cabin_data_backup/uploads" ]; then
            rm -rf data/uploads
            cp -R /tmp/cabin_data_backup/uploads data/
          fi

          # Restore .env file
          if [ -f "/tmp/cabin_data_backup/.env" ]; then
            echo "Restoring .env file..."
            cp /tmp/cabin_data_backup/.env .env
          fi

          rm -rf /tmp/cabin_data_backup

          echo "=== Configuring environment ==="
          # Create .env file from GitHub secrets ONLY if .env doesn't already exist
          if [ ! -f ".env" ]; then
            if [ -n "${{ secrets.DATABASE_URL }}" ] && [ "${{ secrets.DATABASE_URL }}" != "" ]; then
              echo "Creating .env from GitHub secrets..."
              cat > .env << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          PORT=3000
          EOF
            else
              echo "ERROR: .env file not found and no GitHub secrets configured!"
              echo ""
              echo "Option 1: Create .env manually on server with:"
              echo "  DATABASE_URL=postgresql://user:password@localhost:5432/dbname"
              echo "  JWT_SECRET=your-secret-key"
              echo "  PORT=3000"
              echo ""
              echo "Option 2: Add these secrets to GitHub repository:"
              echo "  - DATABASE_URL"
              echo "  - JWT_SECRET"
              exit 1
            fi
          else
            echo ".env file exists (restored from backup or already on server)"
          fi

          echo "=== Installing dependencies ==="
          npm ci

          echo "=== Stopping application ==="
          # Stop PM2 to release file locks
          pm2 stop chata-app 2>/dev/null || true
          
          echo "=== Generating Prisma client ==="
          # Move old Prisma directory out of the way (avoids permission issues)
          if [ -d "src/generated/prisma" ]; then
            echo "Moving old Prisma directory..."
            mv src/generated/prisma src/generated/prisma.old 2>/dev/null || rm -rf src/generated/prisma 2>/dev/null || true
          fi
          npx prisma generate

          echo "=== Running database migrations ==="
          npx prisma migrate deploy

          echo "=== Cleaning dist directory ==="
          # Move old build artifacts out of the way (avoids permission issues)
          if [ -d "dist" ]; then
            echo "Moving old dist directory..."
            ls -la dist/ | head -3
            mv dist dist.old.$(date +%s) 2>/dev/null || rm -rf dist 2>/dev/null || true
          fi

          echo "=== Building frontend ==="
          npm run build

          echo "=== Restarting application ==="
          # Restart PM2 process, or start it if it doesn't exist yet
          pm2 restart chata-app 2>/dev/null || pm2 start npm --name "chata-app" -- run start
          pm2 save

